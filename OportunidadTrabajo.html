<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Oportunidad de Trabajo</title>

<style>

/* BASE */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background-color: #c0c0c0;
    color: #333;
}

p {
    line-height: 1.6;
}

h1, h2, h3 {
    margin-bottom: 10px;
}

ul {
    list-style: none;
    padding: 0;
}

img {
    max-width: 100%;
    height: auto;
}

/* HEADER */
header {
    background-color: #4e5b64;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* NAVBAR */
.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    padding: 6px 10px;
    border-radius: 6px;
    transition: 0.3s;
}

.navbar a:hover {
    background-color: #eeb906;
    color: black;
}

/* SECCIONES (MEJORADAS) */
section, .postulacion {
    background: white;
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

h2 {
    color: #47606f;
}

/* FORMULARIOS */
form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

input, textarea {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

textarea {
    resize: none;
    height: 100px;
}

/* CHECKBOX */
.checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}

/* BOTONES UNIFICADOS */
button, .boton {
    background-color: #47606f;
    color: white;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
}

button:hover, .boton:hover {
    background-color: #eeb906;
    color: black;
}

/* BOTÓN VOLVER */
.boton {
    display: block;
    width: 280px;
    margin: 20px auto;
}

/* FOOTER */
footer {
    background-color: #4e5b64;
    color: white;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<header>
    <h1>Oportunidades de Trabajo</h1>

    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="SobreNosotros.html">Sobre Nosotros</a>
        <a href="index.html#contacto">Contáctanos</a>
        <a href="OportunidadTrabajo.html">Trabajo</a>
        <a href="InicioSesion.html">Ingresar</a>
    </nav>
</header>

<section>
    <h2>¿Querés formar parte de nuestro equipo?</h2>
    <p>
        En Todo en Blanco buscamos personas comprometidas que quieran crecer 
        dentro de una empresa en constante desarrollo.
    </p>
</section>

<section class="postulacion">
    <h2>Postulación</h2>

    <form>

        <!-- EMAIL -->
        <input 
            type="email" 
            name="email"
            placeholder="Correo electrónico" 
            required 
            autocomplete="email"
        >

        <!-- DESCRIPCIÓN -->
        <textarea 
            name="mensaje"
            placeholder="Contanos sobre vos, experiencia y puesto al que aplicás"
            required
        ></textarea>

        <!-- ARCHIVO PDF -->
        <input 
            type="file" 
            name="cv"
            accept=".pdf" 
            required
        >

        <!-- CHECKBOX -->
        <label class="checkbox">
            <input type="checkbox" required>
            Acepto ser contactado por la empresa
        </label>

        <!-- BOTÓN -->
        <button type="submit">Enviar Solicitud</button>

    </form>

</section>

<a href="index.html" class="boton">
    Volver al inicio
</a>

<footer>

    <p>© Todo en Blanco</p>

    <p>
        <a href="https://instagram.com/todoenblanco" target="_blank">Instagram</a>
    </p>

</footer>


</body>
</html>
