<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Administración</title>

<style>

/* BASE */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background-color: #c0c0c0;
    color: #333;
}

p {
    line-height: 1.6;
}

/* HEADER */
header {
    background-color: #4e5b64;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* NAVBAR */
.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    padding: 8px 12px;
    border-radius: 6px;
    transition: 0.3s;
}

.navbar a:hover {
    background-color: #eeb906;
    color: black;
}

/* CONTENIDO */
main {
    margin: 30px;
}

/* CONTENEDOR TABLA (clave para estética) */
.tabla-contenedor {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 14px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

th {
    background-color: #4e5b64;
    color: white;
}

tr:hover {
    background-color: #f2f2f2;
}

/* BOTONES UNIFICADOS */
button, .boton {
    background-color: #47606f;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    font-size: 13px;
}

button:hover, .boton:hover {
    background-color: #eeb906;
    color: black;
}

/* BOTONES DE ACCIÓN */
.acciones button {
    margin: 3px;
}

/* FOOTER */
footer {
    background-color: #4e5b64;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

</style>
</head>

<body>

<header>
    <h1>Panel de Administración</h1>

    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="SobreNosotros.html">Sobre Nosotros</a>
        <a href="index.html#contacto">Contáctanos</a>
        <a href="OportunidadTrabajo.html">Trabajo</a>
        <a href="InicioSesion.html">Salir</a>
    </nav>
</header>

<main>

<h2>Empleados registrados</h2>

<div class="tabla-contenedor">

    <table>
        <tr>
            <th>Cédula</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Cargo</th>
            <th>Acciones</th>
        </tr>

        <tr>
            <td>12345678</td>
            <td>Juan</td>
            <td>Pérez</td>
            <td>Logística</td>
            <td class="acciones">
                <button>Editar</button>
                <button>Eliminar</button>
            </td>
        </tr>

        <tr>
            <td>87654321</td>
            <td>Ana</td>
            <td>Gómez</td>
            <td>Administración</td>
            <td class="acciones">
                <button>Editar</button>
                <button>Eliminar</button>
            </td>
        </tr>

    </table>

</div>

</main>

<footer>
    <p>Panel interno - Todo en Blanco</p>
</footer>


</body>
</html>
