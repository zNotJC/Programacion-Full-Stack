<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio de Sesión</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background-color: #f5f9ff;
}

/* HEADER */
header {
    background-color: #007BFF;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

/* BARRA DE NAVEGACIÓN */
.navbar {
    display: flex;
    gap: 15px;
}

.navbar a {
    background-color: white;
    color: #007BFF;
    padding: 8px 12px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    background-color: #0056b3;
    color: white;
}

.navbar a:active {
    transform: scale(0.95);
}

/* CONTENEDOR */
.contenedor {
    max-width: 400px;
    margin: 40px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* FORMULARIO */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

input, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BOTÓN */
button {
    background-color: #007BFF;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

/* VOLVER */
.boton {
    display: block;
    width: 200px;
    margin: 20px auto;
    padding: 10px;
    background-color: #007BFF;
    color: white;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
}

/* FOOTER */
footer {
    background-color: #007BFF;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Ingreso de Empleados</h1>

    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="SobreNosotros.html">Sobre Nosotros</a>
        <a href="index.html#contacto">Contáctanos</a>
        <a href="OportunidadTrabajo.html">Trabajo</a>
        <a href="InicioSesion.html">Ingresar</a>
    </nav>
</header>

<div class="contenedor">

    <form>

        <!-- CÉDULA -->
        <input 
            type="text" 
            name="cedula"
            placeholder="Cédula (sin puntos ni guiones)"
            required
            pattern="[0-9]{7,8}"
            inputmode="numeric"
        >

        <!-- CONTRASEÑA -->
        <input 
            type="password" 
            name="password"
            placeholder="Contraseña"
            required
        >

        <!-- BOTÓN -->
        <button type="submit">Ingresar</button>

    </form>

</div>

<a href="index.html" class="boton">
    Volver al inicio
</a>

<footer>
    <p>Todo en Blanco - Sistema interno</p>
</footer>

</body>
</html>
