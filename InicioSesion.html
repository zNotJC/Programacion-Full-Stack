<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio de Sesión</title>

<style>

/* BASE */
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background-color: #c0c0c0;
    color: #333;
}

p {
    line-height: 1.6;
}

/* HEADER */
header {
    background-color: #4e5b64;
    color: white;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* NAVBAR */
.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    padding: 8px 12px;
    border-radius: 6px;
    transition: 0.3s;
}

.navbar a:hover {
    background-color: #eeb906;
    color: black;
}

/* CONTENEDOR LOGIN */
.contenedor {
    max-width: 400px;
    margin: 50px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* FORMULARIO */
form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 10px;
}

input {
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BOTONES UNIFICADOS */
button, .boton {
    background-color: #47606f;
    color: white;
    padding: 12px;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
    font-weight: bold;
}

button:hover, .boton:hover {
    background-color: #eeb906;
    color: black;
}

/* BOTÓN VOLVER */
.boton {
    display: block;
    width: 200px;
    margin: 25px auto;
}

/* FOOTER */
footer {
    background-color: #4e5b64;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 40px;
}

</style>
</head>

<body>

<header>
    <div class="logo">Todo en Blanco</div>

    <nav class="navbar">
        <a href="index.html">Inicio</a>
        <a href="SobreNosotros.html">Sobre Nosotros</a>
        <a href="index.html#contacto">Contáctanos</a>
        <a href="OportunidadTrabajo.html">Trabajo</a>
        <a href="InicioSesion.html">Ingresar</a>
    </nav>
</header>

<section>
    <h2>Ingreso de Empleados</h2>
</section>

<div class="contenedor">

    <form>

        <input 
            type="text" 
            name="cedula"
            placeholder="Cédula (sin puntos ni guiones)"
            required
            pattern="[0-9]{7,8}"
            inputmode="numeric"
        >

        <input 
            type="password" 
            name="password"
            placeholder="Contraseña (mínimo 6 caracteres)"
            required
            minlength="6"
        >

        <button type="submit">Ingresar</button>

    </form>

</div>

<a href="index.html" class="boton">
    Volver al inicio
</a>

<footer>
    <p>Todo en Blanco - Sistema interno</p>
</footer>

</body>
</html>
